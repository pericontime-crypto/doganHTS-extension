<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dogan HTS</title>
<style>
body{width:350px;padding:15px;font-family:Arial,sans-serif;background:#f5f5f5}
h2{color:#1a1a2e;font-size:15px;margin-bottom:10px}
.btn{width:100%;padding:10px;margin:4px 0;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:bold}
.btn-primary{background:#1a1a2e;color:white}
.btn-success{background:#4caf50;color:white}
.btn-warning{background:#ff9800;color:white}
.btn:disabled{opacity:0.5;cursor:not-allowed}
#status{padding:8px;background:#e8f5e9;border-radius:5px;margin:8px 0;font-size:12px;color:#2e7d32}
#status.error{background:#ffebee;color:#c62828}
#status.loading{background:#fff3e0;color:#e65100}
#docList{font-size:12px;max-height:120px;overflow-y:auto;margin:5px 0}
.doc-item{padding:4px 0;border-bottom:1px solid #eee}
#results{font-size:12px;background:white;padding:8px;border-radius:5px;margin:5px 0;display:none;max-height:150px;overflow-y:auto}
.r-item{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f0f0f0}
.r-key{color:#666}
.r-val{color:#333;font-weight:bold}
</style>
</head>
<body>
<h2>🏛️ Dogan HTS Asistan</h2>
<div id="status">✅ Hazır</div>
<div id="docList"></div>
<button class="btn btn-primary" id="scanBtn">🔍 Evrakları Tara</button>
<button class="btn btn-warning" id="analyzeBtn" disabled>⚡ Analiz Et</button>
<div id="results"></div>
<button class="btn btn-success" id="fillBtn" disabled>✅ Formu Doldur</button>
<script src="popup.js"></script>
</body>
</html>
